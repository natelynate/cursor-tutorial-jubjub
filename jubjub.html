<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦝 줍줍 - 사내 분실물 매칭</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
    background: #fdf6ef;
    color: #3a2e26;
    min-height: 100vh;
    padding: 20px;
  }
  .container { max-width: 720px; margin: 0 auto; }

  header {
    border-radius: 16px;
    margin-bottom: 16px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(240, 133, 90, 0.22);
    background: #fff5ee;
    line-height: 0; /* img 아래 공백 제거 */
  }
  .navbar-banner {
    display: block;
    width: 100%;
    /* 이미지 비율상 "줍줍" 타이틀 + 너구리 상반신이 들어오는 높이 */
    height: 450px;
    object-fit: cover;
    /* 상단 한화 로고·줍줍 타이틀·너구리 상반신 구간을 중심으로 */
    object-position: 50% 28%;
  }
  @media (max-width: 480px) {
    .navbar-banner { height: 120px; object-position: 50% 20%; }
  }

  .api-bar {
    background: #fff;
    border: 1px solid #f0e0d0;
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .api-bar label { font-size: 13px; color: #888; white-space: nowrap; }
  .api-bar input {
    flex: 1;
    border: none;
    background: #f9f5f0;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
  }
  .api-bar input:focus { outline: 2px solid #f5a878; }

  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .tab {
    flex: 1;
    background: #fff;
    border: 1px solid #f0e0d0;
    padding: 14px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    color: #666;
    transition: all 0.2s;
    position: relative;
  }
  .tab:hover { background: #fdf0e3; }
  .tab.active {
    background: #f5a878;
    color: #fff;
    border-color: #f5a878;
  }
  .tab .badge {
    position: absolute;
    top: 6px;
    right: 8px;
    background: #ff5252;
    color: #fff;
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 10px;
    min-width: 18px;
    display: none;
  }
  .tab .badge.show { display: inline-block; }

  .panel { display: none; }
  .panel.active { display: block; }

  .card-section {
    background: #fff;
    border: 1px solid #f0e0d0;
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
  }
  .card-section h2 {
    font-size: 17px;
    margin-bottom: 6px;
    color: #d97f3f;
  }
  .card-section .hint {
    font-size: 13px;
    color: #999;
    margin-bottom: 16px;
    line-height: 1.5;
  }

  form { display: flex; flex-direction: column; gap: 10px; }
  input[type=text], textarea {
    border: 1px solid #f0e0d0;
    background: #fdf8f3;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
  }
  input[type=text]:focus, textarea:focus {
    outline: 2px solid #f5a878;
    background: #fff;
  }
  textarea { min-height: 70px; }

  button.primary {
    background: #f5a878;
    color: #fff;
    border: none;
    padding: 12px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  button.primary:hover { background: #e89461; }
  button.primary:disabled { background: #ccc; cursor: not-allowed; }

  .item-list { margin-top: 16px; display: flex; flex-direction: column; gap: 10px; }
  .item {
    background: #fdf8f3;
    border: 1px solid #f0e0d0;
    border-radius: 12px;
    padding: 14px 16px;
    position: relative;
  }
  .item-title { font-weight: 500; margin-bottom: 4px; font-size: 14px; }
  .item-desc { font-size: 13px; color: #666; line-height: 1.5; margin-bottom: 4px; }
  .item-meta { font-size: 11px; color: #aaa; }
  .item .delete-btn {
    position: absolute;
    top: 12px;
    right: 12px;
    background: none;
    border: none;
    color: #c66;
    cursor: pointer;
    font-size: 12px;
  }

  .alert-item {
    background: linear-gradient(135deg, #fff4e6 0%, #ffe8d1 100%);
    border: 2px solid #f5a878;
  }
  .alert-item.read { opacity: 0.7; background: #fdf8f3; border-color: #f0e0d0; }
  .similarity {
    display: inline-block;
    background: #f0855a;
    color: #fff;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .reason {
    background: #fff;
    border-left: 3px solid #f5a878;
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 12px;
    color: #666;
    margin-top: 6px;
  }

  .empty {
    text-align: center;
    color: #aaa;
    padding: 30px;
    font-size: 13px;
  }

  #status {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #3a2e26;
    color: #fff;
    padding: 12px 24px;
    border-radius: 24px;
    font-size: 13px;
    display: none;
    z-index: 100;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  #status.show { display: block; }

  .demo-hint {
    background: #fff8e6;
    border: 1px dashed #e8b864;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: #876530;
    margin-bottom: 12px;
  }
  .demo-hint.error {
    background: #ffebee;
    border-color: #e57373;
    color: #8a2c2c;
  }
  .search-row {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
    align-items: center;
    flex-wrap: wrap;
  }
  .search-row label { font-size: 13px; color: #888; white-space: nowrap; }
  .search-row input[type=search] {
    flex: 1;
    min-width: 160px;
    border: 1px solid #f0e0d0;
    background: #fdf8f3;
    padding: 10px 12px;
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
  }
  .search-row input[type=search]:focus {
    outline: 2px solid #f5a878;
    background: #fff;
  }
  .monitor-bar {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: #666;
    margin-top: 12px;
  }
  .monitor-bar select {
    border: 1px solid #f0e0d0;
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 13px;
    font-family: inherit;
    background: #fff;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <img
      class="navbar-banner"
      src="/data/logo.png"
      alt="줍줍 — 분실물 매칭 서비스"
      draggable="false"
    >
  </header>

  <div class="tabs">
    <button class="tab active" data-panel="lost">🔍 내 분실물</button>
    <button class="tab" data-panel="board">📋 습득물 게시판</button>
    <button class="tab" data-panel="alerts">🔔 알림 <span class="badge" id="alertBadge">0</span></button>
  </div>

  <!-- 내 분실물 -->
  <div class="panel active" id="panel-lost">
    <div class="card-section">
      <h2>🔍 지금 게시판에서 바로 찾기</h2>
      <form id="recommendForm">
        <input type="text" id="recKeywords" placeholder="키워드 (예: 검정 텀블러, 스타벅스 로고)" required>
        <textarea id="recDescription" placeholder="자세한 설명 (선택, 예: 어제 오후 3층 회의실에서 잃어버림, 파란 스티커)"></textarea>
        <button type="submit" class="primary" id="recSubmit">🤖 AI에게 추천 받기</button>
      </form>
      <div class="item-list" id="recResults"></div>
    </div>

    <div class="card-section">
      <h2>찾고 있는 물건 등록</h2>
      <div class="monitor-bar">
        <span>🔁 AI 주기 스캔</span>
        <select id="scanInterval" title="등록 키워드 vs 전체 게시글 재검사 간격">
          <option value="0">끔</option>
          <option value="30000" selected>30초</option>
          <option value="60000">1분</option>
          <option value="120000">2분</option>
          <option value="300000">5분</option>
        </select>
        <span id="scanStatus">대기 중</span>
      </div>
      <form id="lostForm">
        <input type="text" id="lostKeywords" placeholder="키워드 (예: 검정 텀블러, 스타벅스 로고)" required>
        <textarea id="lostDescription" placeholder="자세한 설명 (예: 어제 오후 3층 대회의실에 두고 옴, 파란 스티커 부착)"></textarea>
        <input type="file" id="lostImage" accept="image/*">
        <button type="submit" class="primary">키워드 등록하기</button>
      </form>
      <div class="item-list" id="myLostList"></div>
    </div>
  </div>

  <!-- 습득물 게시판 -->
  <div class="panel" id="panel-board">
    <div class="card-section">
      <h2>📸 줍줍하기 (습득물 등록)</h2>
      <p class="hint">새 글이 등록되면 모든 사람의 등록된 키워드와 AI가 자동 비교합니다.</p>
      <form id="foundForm">
        <input type="text" id="foundLocation" placeholder="발견 장소 (예: 3층 대회의실)" required>
        <input type="file" id="foundImage" accept="image/*" required>
        <button type="submit" class="primary" id="foundSubmit">줍줍 등록!</button>
      </form>
    </div>
    <div class="card-section">
      <h2>📋 줍줍 게시판</h2>
      <div class="search-row">
        <label for="boardSearch">🔎 검색</label>
        <input type="search" id="boardSearch" placeholder="키워드 (예: 충전기, 3층, 김주섬)" autocomplete="off">
      </div>
      <div class="item-list" id="boardList"></div>
    </div>
  </div>

  <!-- 알림 -->
  <div class="panel" id="panel-alerts">
    <div class="card-section">
      <h2>🔔 매칭 알림</h2>
      <p class="hint">AI가 발견한 매칭 결과입니다.</p>
      <div class="item-list" id="alertsList"></div>
    </div>
  </div>

</div>

<div id="status"></div>

<script>
// ============= 데이터 (알림만 로컬; 분실/습득물은 서버 JSON) =============
const STORAGE_KEY = 'jubjub_alerts_only_v1';
const ALERTED_STORAGE_KEY = 'jubjub_alerted_v1';

function loadData() {
  let raw = localStorage.getItem(STORAGE_KEY);
  let d = raw ? JSON.parse(raw) : { alerts: [] };
  if (!Array.isArray(d.alerts)) d.alerts = [];
  return d;
}
let data = loadData();

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

function getAlertedSet() {
  try {
    const raw = localStorage.getItem(ALERTED_STORAGE_KEY);
    const arr = raw ? JSON.parse(raw) : [];
    return new Set(Array.isArray(arr) ? arr : []);
  } catch {
    return new Set();
  }
}
function saveAlertedSet(set) {
  localStorage.setItem(ALERTED_STORAGE_KEY, JSON.stringify([...set]));
}
let alertedPairs = getAlertedSet();

function pairKey(lostId, postId) {
  return String(lostId) + ':' + String(postId);
}

function markPairAlerted(lostId, postId) {
  alertedPairs.add(pairKey(lostId, postId));
  saveAlertedSet(alertedPairs);
}

// ============= API (Express 서버 + .env 키) =============
let serverOk = false;
async function apiGetFoundItems(q) {
  const url = '/api/found-items' + (q ? '?q=' + encodeURIComponent(q) : '');
  const res = await fetch(url);
  if (!res.ok) throw new Error('found-items ' + res.status);
  return res.json();
}

async function apiAddFoundItem({ location, file }) {
  // #region agent log
  fetch('http://127.0.0.1:7884/ingest/5e8df2af-a849-40e1-b0c9-c94885113c23',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'26b669'},body:JSON.stringify({sessionId:'26b669',runId:'save-debug-1',hypothesisId:'H1',location:'jubjub.html:apiAddFoundItem:start',message:'calling /api/found-items',data:{hasLocation:!!location,hasFile:!!file,fileType:file&&file.type?file.type:null,fileSize:file&&file.size?file.size:null},timestamp:Date.now()})}).catch(()=>{});
  // #endregion
  const fd = new FormData();
  fd.append('location', location);
  fd.append('image', file);
  const res = await fetch('/api/found-items', { method: 'POST', body: fd });
  if (!res.ok) {
    const t = await res.text();
    // #region agent log
    fetch('http://127.0.0.1:7884/ingest/5e8df2af-a849-40e1-b0c9-c94885113c23',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'26b669'},body:JSON.stringify({sessionId:'26b669',runId:'save-debug-1',hypothesisId:'H2',location:'jubjub.html:apiAddFoundItem:fail',message:'/api/found-items non-ok',data:{status:res.status,responseText:t.slice(0,300)},timestamp:Date.now()})}).catch(()=>{});
    // #endregion
    throw new Error(t);
  }
  // #region agent log
  fetch('http://127.0.0.1:7884/ingest/5e8df2af-a849-40e1-b0c9-c94885113c23',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'26b669'},body:JSON.stringify({sessionId:'26b669',runId:'save-debug-1',hypothesisId:'H4',location:'jubjub.html:apiAddFoundItem:ok',message:'/api/found-items success',data:{status:res.status},timestamp:Date.now()})}).catch(()=>{});
  // #endregion
  return res.json();
}

async function apiPatchFoundStatus(id, status) {
  const res = await fetch('/api/found-items/' + id + '/status', {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status }),
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function apiDeleteFoundItem(id) {
  const res = await fetch('/api/found-items/' + id, { method: 'DELETE' });
  if (!res.ok) throw new Error('delete ' + res.status);
  return res.json();
}

async function apiGetLostItems(q) {
  const url = '/api/lost-items' + (q ? '?q=' + encodeURIComponent(q) : '');
  const res = await fetch(url);
  if (!res.ok) throw new Error('lost-items ' + res.status);
  return res.json();
}

async function apiAddLostItem({ inputKeywords, inputDescription, file }) {
  // #region agent log
  fetch('http://127.0.0.1:7884/ingest/5e8df2af-a849-40e1-b0c9-c94885113c23',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'26b669'},body:JSON.stringify({sessionId:'26b669',runId:'save-debug-1',hypothesisId:'H1',location:'jubjub.html:apiAddLostItem:start',message:'calling /api/lost-items',data:{hasKeywords:!!inputKeywords,descLen:(inputDescription||'').length,hasFile:!!file,fileType:file&&file.type?file.type:null,fileSize:file&&file.size?file.size:null},timestamp:Date.now()})}).catch(()=>{});
  // #endregion
  const fd = new FormData();
  fd.append('inputKeywords', inputKeywords);
  fd.append('inputDescription', inputDescription || '');
  if (file) fd.append('image', file);
  const res = await fetch('/api/lost-items', { method: 'POST', body: fd });
  if (!res.ok) {
    const t = await res.text();
    // #region agent log
    fetch('http://127.0.0.1:7884/ingest/5e8df2af-a849-40e1-b0c9-c94885113c23',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'26b669'},body:JSON.stringify({sessionId:'26b669',runId:'save-debug-1',hypothesisId:'H2',location:'jubjub.html:apiAddLostItem:fail',message:'/api/lost-items non-ok',data:{status:res.status,responseText:t.slice(0,300)},timestamp:Date.now()})}).catch(()=>{});
    // #endregion
    throw new Error(t);
  }
  // #region agent log
  fetch('http://127.0.0.1:7884/ingest/5e8df2af-a849-40e1-b0c9-c94885113c23',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'26b669'},body:JSON.stringify({sessionId:'26b669',runId:'save-debug-1',hypothesisId:'H4',location:'jubjub.html:apiAddLostItem:ok',message:'/api/lost-items success',data:{status:res.status},timestamp:Date.now()})}).catch(()=>{});
  // #endregion
  return res.json();
}

async function apiPatchLostStatus(id, status) {
  const res = await fetch('/api/lost-items/' + id + '/status', {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status }),
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function apiDeleteLostItem(id) {
  const res = await fetch('/api/lost-items/' + id, { method: 'DELETE' });
  if (!res.ok) throw new Error('delete ' + res.status);
  return res.json();
}

async function apiRecommend(body) {
  const res = await fetch('/api/recommend', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const text = await res.text();
  if (!res.ok) {
    let detail = text;
    try { detail = JSON.parse(text).error || text; } catch {}
    throw new Error(detail || ('recommend ' + res.status));
  }
  return JSON.parse(text);
}

// ============= 탭 전환 =============
document.querySelectorAll('.tab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('panel-' + t.dataset.panel).classList.add('active');
    if (t.dataset.panel === 'alerts') markAlertsRead();
  };
});

// ============= GPT 매칭 (서버가 .env 키로 OpenAI 호출) =============
async function checkMatch(myKeywords, myDesc, foundDesc, foundLoc) {
  try {
    const res = await fetch('/api/match', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        lostKeywords: myKeywords,
        lostDescription: myDesc || '',
        foundDescription: foundDesc,
        foundLocation: foundLoc || '',
      }),
    });
    const text = await res.text();
    if (!res.ok) {
      console.error('매칭 API 오류', res.status, text);
      return null;
    }
    return JSON.parse(text);
  } catch (e) {
    console.error('매칭 API 에러:', e);
    return null;
  }
}

async function matchLostAgainstFoundItem(lost, found, opts) {
  const silent = opts && opts.silent;
  if (alertedPairs.has(pairKey(lost.id, found.id))) return false;
  const foundText = (found.description || '') + (Array.isArray(found.keywords) && found.keywords.length ? ' (키워드: ' + found.keywords.join(', ') + ')' : '');
  const myKeywords = (Array.isArray(lost.mergedKeywords) && lost.mergedKeywords.length ? lost.mergedKeywords.join(' ') : (lost.inputKeywords || ''));
  const result = await checkMatch(myKeywords, lost.inputDescription || '', foundText, found.location);
  if (!result) {
    if (!silent) showStatus('⚠️ AI 매칭 실패 (.env 키·네트워크 확인)');
    return false;
  }
  const sim = Number(result.similarity);
  const ok = result.match === true || (Number.isFinite(sim) && sim >= 50);
  if (!ok) return false;
  const alert = {
    id: Date.now() + Math.random(),
    lostItemId: lost.id,
    foundItemId: found.id,
    lostKeywords: myKeywords,
    foundLocation: found.location,
    foundDescription: found.description || '',
    foundImageRelPath: found.imageRelPath || '',
    foundKeywords: Array.isArray(found.keywords) ? found.keywords : [],
    similarity: Number.isFinite(sim) ? sim : 0,
    reason: result.reason || '',
    timestamp: new Date().toLocaleString('ko-KR'),
    read: false,
  };
  data.alerts.unshift(alert);
  save();
  markPairAlerted(lost.id, found.id);
  sendBrowserNotification(alert);
  renderAlerts();
  return true;
}

async function runMatchAllForFoundItem(found, opts) {
  const { lostItems } = await apiGetLostItems('');
  if (!lostItems || lostItems.length === 0) return 0;
  let n = 0;
  for (const lost of lostItems) {
    if (lost.status && lost.status !== 'open') continue;
    if (await matchLostAgainstFoundItem(lost, found, opts)) n++;
  }
  return n;
}

let scanTimer = null;
let scanBusy = false;

function setScanStatus(msg) {
  const el = document.getElementById('scanStatus');
  if (el) el.textContent = msg;
}

async function periodicScanTick() {
  if (!serverOk || scanBusy) return;
  scanBusy = true;
  setScanStatus('스캔 중…');
  try {
    const { foundItems } = await apiGetFoundItems('');
    const { lostItems } = await apiGetLostItems('');
    if (!lostItems || lostItems.length === 0) {
      setScanStatus('대기 중');
      return;
    }
    let newAlerts = 0;
    for (const found of foundItems || []) {
      if (found.status && found.status === 'returned') continue;
      for (const lost of lostItems) {
        if (lost.status && lost.status !== 'open') continue;
        if (await matchLostAgainstFoundItem(lost, found, { silent: true })) newAlerts++;
      }
    }
    setScanStatus(newAlerts ? '추천 ' + newAlerts + '건' : '변화 없음');
    if (newAlerts) showStatus('🔔 주기 스캔: 새 추천 ' + newAlerts + '건');
  } catch (e) {
    console.error(e);
    setScanStatus('오류');
  } finally {
    scanBusy = false;
  }
}

function restartScanTimer() {
  if (scanTimer) clearInterval(scanTimer);
  scanTimer = null;
  const sel = document.getElementById('scanInterval');
  const ms = sel ? Number(sel.value) : 0;
  if (!ms) {
    setScanStatus('꺼짐');
    return;
  }
  setScanStatus('~' + Math.round(ms / 1000) + '초마다');
  scanTimer = setInterval(periodicScanTick, ms);
}

const scanIntervalEl = document.getElementById('scanInterval');
if (scanIntervalEl) {
  scanIntervalEl.onchange = restartScanTimer;
}

// ============= 즉시 추천 검색 (게시판 전체 vs 입력 description) =============
document.getElementById('recommendForm').onsubmit = async e => {
  e.preventDefault();
  const inputKeywords = document.getElementById('recKeywords').value.trim();
  const inputDescription = document.getElementById('recDescription').value.trim();
  if (!inputKeywords) return;

  const btn = document.getElementById('recSubmit');
  const resultsEl = document.getElementById('recResults');
  btn.disabled = true;
  btn.textContent = '🔎 검색 중...';
  resultsEl.innerHTML = '<div class="empty">🤖 AI가 게시판을 훑어보는 중...</div>';

  try {
    const { recommendations = [], totalScanned = 0 } = await apiRecommend({
      inputKeywords,
      inputDescription,
    });
    renderRecommendations(recommendations, totalScanned);
    if (recommendations.length > 0) {
      showStatus('🎯 후보 ' + recommendations.length + '건 추천!');
    } else {
      showStatus('🤖 게시판 ' + totalScanned + '건 검토, 매칭 없음');
    }
  } catch (err) {
    console.error(err);
    resultsEl.innerHTML = '<div class="empty" style="color:#c66">⚠️ 추천을 받지 못했습니다: ' + escape(String(err.message || err)) + '</div>';
  } finally {
    btn.disabled = false;
    btn.textContent = '🤖 AI에게 추천 받기';
  }
};

function renderRecommendations(recs, totalScanned) {
  const el = document.getElementById('recResults');
  if (!Array.isArray(recs) || recs.length === 0) {
    el.innerHTML = '<div class="empty">🤖 게시판 ' + totalScanned + '건을 모두 살펴봤지만, 비슷한 항목이 없어요.<br>아래에서 분실물을 등록해두면 새 글이 올라올 때 알려드릴게요.</div>';
    return;
  }
  const strong = recs.filter(r => r.similarity >= 45);
  const weak = recs.filter(r => r.similarity >= 25 && r.similarity < 45);

  let html = '<div style="font-size:12px; color:#888; margin-top:14px; margin-bottom:4px;">게시판 ' + totalScanned + '건 검토 완료</div>';
  if (strong.length > 0) {
    html += '<div style="font-size:13px; color:#d97f3f; font-weight:500; margin-top:8px;">🎯 가능성 높음 (' + strong.length + '건)</div>';
    html += strong.map(renderRecCard).join('');
  }
  if (weak.length > 0) {
    html += '<div style="font-size:13px; color:#888; margin-top:14px;">🤔 약한 후보 (' + weak.length + '건)</div>';
    html += weak.map(renderRecCard).join('');
  }
  if (strong.length === 0 && weak.length === 0) {
    html += '<div class="empty">🤖 의미 있는 후보가 없어요. 키워드를 더 구체적으로 적어보세요.</div>';
  }
  el.innerHTML = html;
}

function renderRecCard(r) {
  const it = r.foundItem || {};
  const cls = r.similarity >= 45 ? 'item alert-item' : 'item';
  const kws = Array.isArray(it.keywords) && it.keywords.length
    ? it.keywords.map(k => `<span class="similarity" style="background:#f5a878; margin-right:6px;">#${escape(k)}</span>`).join('')
    : '';
  return `
    <div class="${cls}">
      <span class="similarity">추천 ${r.similarity}%</span>
      <div class="item-title">📍 ${escape(it.location || '(장소 미상)')}</div>
      ${it.imageRelPath ? `<div class="item-desc"><img alt="습득물 이미지" src="/${escape(it.imageRelPath)}" style="max-width:100%; border-radius:10px; border:1px solid #f0e0d0;"></div>` : ''}
      <div class="item-desc">${escape(it.description || '(AI 분석 결과 없음)')}</div>
      ${kws ? `<div class="item-desc">${kws}</div>` : ''}
      <div class="reason">💡 ${escape(r.reason || '판단 근거 없음')}</div>
      <div class="item-meta">${escape(it.createdAt || '')} · id ${it.id}</div>
    </div>
  `;
}

  } catch (err) {
    // #region agent log
    fetch('http://127.0.0.1:7884/ingest/5e8df2af-a849-40e1-b0c9-c94885113c23',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'26b669'},body:JSON.stringify({sessionId:'26b669',runId:'save-debug-1',hypothesisId:'H5',location:'jubjub.html:lostForm:catch',message:'lost save catch',data:{error:String(err&&err.message?err.message:err)},timestamp:Date.now()})}).catch(()=>{});

async function refreshLostList() {
  try {
    const { lostItems } = await apiGetLostItems('');
    renderLost(lostItems || []);
    serverOk = true;
  } catch (e) {
    console.error(e);
    renderLost([]);
    serverOk = false;
  }
}

function renderLost(lostItems) {
  const el = document.getElementById('myLostList');
  if (!lostItems || lostItems.length === 0) {
    el.innerHTML = '<div class="empty">아직 등록한 분실물이 없어요. 위에 등록하면 24시간 모니터링이 시작됩니다.</div>';
    return;
  }
  el.innerHTML = lostItems.map(i => `
    <div class="item">
      <div class="item-title">🔍 ${escape(i.inputKeywords || '')}</div>
      <div class="item-desc">${escape(i.inputDescription) || '<i style="color:#bbb">설명 없음</i>'}</div>
      ${i.imageRelPath ? `<div class="item-desc"><img alt="분실물 이미지" src="/${escape(i.imageRelPath)}" style="max-width:100%; border-radius:10px; border:1px solid #f0e0d0;"></div>` : ''}
      <div class="item-meta">${escape(i.createdAt || '')}</div>
      <div class="monitor-bar" style="margin-top:8px;">
        <button class="primary" data-lost-search="${i.id}" style="padding:6px 12px; font-size:12px;">🔍 지금 검색</button>
        <span>상태</span>
        <select data-lost-status="${i.id}">
          <option value="open" ${i.status === 'open' ? 'selected' : ''}>미해결</option>
          <option value="found" ${i.status === 'found' ? 'selected' : ''}>찾음</option>
        </select>
        <button class="delete-btn" data-lost-delete="${i.id}">삭제</button>
      </div>
    </div>
  `).join('');

  el.querySelectorAll('[data-lost-delete]').forEach(btn => {
    btn.onclick = () => deleteLost(Number(btn.getAttribute('data-lost-delete')));
  });
  el.querySelectorAll('[data-lost-search]').forEach(btn => {
    btn.onclick = async () => {
      const id = Number(btn.getAttribute('data-lost-search'));
      const origText = btn.textContent;
      btn.disabled = true;
      btn.textContent = '🔎 검색 중...';
      const resultsEl = document.getElementById('recResults');
      resultsEl.innerHTML = '<div class="empty">🤖 AI가 게시판을 훑어보는 중...</div>';
      try {
        const { recommendations = [], totalScanned = 0 } = await apiRecommend({ lostItemId: id });
        renderRecommendations(recommendations, totalScanned);
        // 즉시 입력 폼은 비워서 혼동 방지
        document.getElementById('recKeywords').value = '';
        document.getElementById('recDescription').value = '';
        // 결과로 스크롤
        resultsEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        showStatus(recommendations.length > 0 ? '🎯 후보 ' + recommendations.length + '건!' : '🤖 매칭 없음');
      } catch (e) {
        console.error(e);
        resultsEl.innerHTML = '<div class="empty" style="color:#c66">⚠️ 추천을 받지 못했습니다: ' + escape(String(e.message || e)) + '</div>';
      } finally {
        btn.disabled = false;
        btn.textContent = origText;
      }
    };
  });
  el.querySelectorAll('[data-lost-status]').forEach(sel => {
    sel.onchange = async () => {
      const id = Number(sel.getAttribute('data-lost-status'));
      const status = sel.value;
      try {
        await apiPatchLostStatus(id, status);
        await refreshLostList();
      } catch (e) {
        console.error(e);
        alert('상태 변경 실패');
      }
    };
  });
}

window.deleteLost = id => {
  if (!confirm('이 분실물 항목을 삭제할까요?')) return;
  apiDeleteLostItem(id)
    .then(refreshLostList)
    .then(() => showStatus('🗑️ 삭제했습니다'))
    .catch((e) => {
      console.error(e);
      alert('삭제 실패');
    });
};

let boardSearchDebounce;
document.getElementById('boardSearch').addEventListener('input', () => {
  clearTimeout(boardSearchDebounce);
  boardSearchDebounce = setTimeout(refreshBoardList, 280);
});

async function refreshBoardList() {
  const el = document.getElementById('boardList');
  const q = document.getElementById('boardSearch').value.trim();
  try {
    const { foundItems } = await apiGetFoundItems(q);
    serverOk = true;
    const hint = document.getElementById('serverHint');
    if (hint) {
      hint.classList.remove('error');
    }
    if (!foundItems || foundItems.length === 0) {
      el.innerHTML = '<div class="empty">' + (q ? '검색 결과가 없어요.' : '아직 습득물이 없어요.') + '</div>';
      return;
    }
    el.innerHTML = foundItems.map(p => `
    <div class="item">
      <div class="item-title">📍 ${escape(p.location)}</div>
      ${p.imageRelPath ? `<div class="item-desc"><img alt="습득물 이미지" src="/${escape(p.imageRelPath)}" style="max-width:100%; border-radius:10px; border:1px solid #f0e0d0;"></div>` : ''}
      <div class="item-desc">${escape(p.description || '⏳ AI가 이미지 분석 중…')}</div>
      <div class="item-desc">${Array.isArray(p.keywords) && p.keywords.length ? p.keywords.map(k => `<span class="similarity" style="background:#f5a878; margin-right:6px;">#${escape(k)}</span>`).join('') : ''}</div>
      <div class="monitor-bar" style="margin-top:8px;">
        <span>상태</span>
        <select data-found-status="${p.id}">
          <option value="stored" ${p.status === 'stored' ? 'selected' : ''}>보관중</option>
          <option value="returned" ${p.status === 'returned' ? 'selected' : ''}>전달완료</option>
        </select>
        <button type="button" class="delete-btn" data-found-id="${p.id}">삭제</button>
      </div>
      <div class="item-meta">${escape(p.createdAt || '')} · ${escape(p.createdBy || '')} · id ${p.id}</div>
    </div>
  `).join('');
    el.querySelectorAll('[data-found-id]').forEach(btn => {
      btn.onclick = () => deleteBoardFoundItem(Number(btn.getAttribute('data-found-id')));
    });
    el.querySelectorAll('[data-found-status]').forEach(sel => {
      sel.onchange = async () => {
        const id = Number(sel.getAttribute('data-found-status'));
        const status = sel.value;
        try {
          await apiPatchFoundStatus(id, status);
          await refreshBoardList();
        } catch (e) {
          console.error(e);
          alert('상태 변경 실패');
        }
      };
    });
  } catch (err) {
    serverOk = false;
    const hint = document.getElementById('serverHint');
    if (hint) {
      hint.classList.add('error');
      hint.innerHTML = '<strong>서버에 연결할 수 없습니다.</strong> 터미널에서 <code>npm install</code> → <code>npm start</code> 후 <a href="/jubjub.html">/jubjub.html</a>로 열어 주세요.';
    }
    el.innerHTML = '<div class="empty">게시글을 불러오지 못했습니다.</div>';
  }
}

window.deleteBoardFoundItem = async function (id) {
  if (!confirm('이 습득물 항목을 삭제할까요? JSON에서도 제거됩니다.')) return;
  try {
    await apiDeleteFoundItem(id);

  } catch (e) {

};

// ============= 브라우저 알림 =============
async function sendBrowserNotification(alert) {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    await Notification.requestPermission();
  }
  if (Notification.permission === 'granted') {
    new Notification('🦝 줍줍 - 매칭 발견!', {
      body: `"${alert.lostKeywords}"와 맞을 수 있는 물건: ${alert.foundLocation}\n추천 ${alert.similarity}%`,
      tag: 'jubjub-' + alert.id
    });
  }
}

function renderAlerts() {
  const el = document.getElementById('alertsList');
  const unread = data.alerts.filter(a => !a.read).length;
  const badge = document.getElementById('alertBadge');
  badge.textContent = unread;
  badge.classList.toggle('show', unread > 0);

  if (data.alerts.length === 0) {
    el.innerHTML = '<div class="empty">아직 매칭된 알림이 없어요.<br>AI가 24시간 지켜보고 있으니 안심하세요 👀</div>';
    return;
  }
  el.innerHTML = data.alerts.map(a => `
    <div class="item alert-item ${a.read ? 'read' : ''}">
      <span class="similarity">추천 확률 ${a.similarity}%</span>
      <div class="item-title">🎯 "${escape(a.lostKeywords)}" 후보</div>
      <div class="item-desc">📍 ${escape(a.foundLocation)}</div>
      ${a.foundImageRelPath ? `<div class="item-desc"><img alt="후보 이미지" src="/${escape(a.foundImageRelPath)}" style="max-width:100%; border-radius:10px; border:1px solid #f0e0d0;"></div>` : ''}
      <div class="item-desc">${escape(a.foundDescription || '')}</div>
      <div class="item-desc">${Array.isArray(a.foundKeywords) && a.foundKeywords.length ? a.foundKeywords.map(k => `<span class="similarity" style="background:#f5a878; margin-right:6px;">#${escape(k)}</span>`).join('') : ''}</div>
      <div class="reason">💡 ${escape(a.reason)}</div>
      <div class="item-meta">${a.timestamp}</div>
    </div>
  `).join('');
}

function markAlertsRead() {
  data.alerts.forEach(a => a.read = true);
  save();
  renderAlerts();
}

// ============= 유틸 =============
function escape(s) {
  if (!s) return '';
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

let statusTimer;
function showStatus(msg) {
  const s = document.getElementById('status');
  s.textContent = msg;
  s.classList.add('show');
  clearTimeout(statusTimer);
  statusTimer = setTimeout(() => s.classList.remove('show'), 2500);
}

// ============= 초기 알림 권한 요청 =============
if ('Notification' in window && Notification.permission === 'default') {
  setTimeout(() => Notification.requestPermission(), 1000);
}

// ============= 초기 렌더링 =============
refreshLostList();
renderAlerts();
refreshBoardList().then(() => restartScanTimer());
